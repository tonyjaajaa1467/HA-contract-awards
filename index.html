        const tableBody = document.getElementById('tableBody');
        const searchInput = document.getElementById('searchInput');
        const recordCount = document.getElementById('recordCount');
        const filterInfo = document.getElementById('filterInfo');
        const noResults = document.getElementById('noResults');
        const table = document.getElementById('dataTable');
        let sortField = null;
        let sortAsc = true;

        // 收集所有筛选下拉
        const filterSelects = document.querySelectorAll('.filter-select[data-field]');

        function collectFilters() {
            const filters = {};
            filterSelects.forEach(sel => {
                const field = sel.getAttribute('data-field');
                const value = sel.value;
                if (value) {
                    filters[field] = value;
                }
            });
            return filters;
        }

        function escapeHtml(text) {
            if (text === null || text === undefined) return '';
            return text.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
        }

        function renderTable(data) {
            tableBody.innerHTML = '';
            if (data.length === 0) {
                noResults.style.display = 'block';
                recordCount.textContent = '显示 0 条记录';
                return;
            }
            noResults.style.display = 'none';
            recordCount.textContent = `显示 ${data.length} 条记录`;

            data.forEach(row => {
                const tr = document.createElement('tr');
                                const td0 = document.createElement("td");
                td0.setAttribute("data-field", "Hospital");
                td0.innerHTML = escapeHtml(row["Hospital"]) || "";
                tr.appendChild(td0);
                const td1 = document.createElement("td");
                td1.setAttribute("data-field", "Tender Reference");
                td1.innerHTML = escapeHtml(row["Tender Reference"]) || "";
                tr.appendChild(td1);
                const td2 = document.createElement("td");
                td2.setAttribute("data-field", "Subject");
                td2.innerHTML = escapeHtml(row["Subject"]) || "";
                td2.style.whiteSpace = "normal";
                tr.appendChild(td2);
                const td3 = document.createElement("td");
                td3.setAttribute("data-field", "Tendering Procedure");
                td3.innerHTML = escapeHtml(row["Tendering Procedure"]) || "";
                tr.appendChild(td3);
                const td4 = document.createElement("td");
                td4.setAttribute("data-field", "Contractor(s) & Address(es)");
                td4.innerHTML = escapeHtml(row["Contractor(s) & Address(es)"]) || "";
                td4.style.whiteSpace = "normal";
                tr.appendChild(td4);
                const td5 = document.createElement("td");
                td5.setAttribute("data-field", "Item");
                td5.innerHTML = escapeHtml(row["Item"]) || "";
                tr.appendChild(td5);
                const td6 = document.createElement("td");
                td6.setAttribute("data-field", "Contract Period");
                td6.innerHTML = escapeHtml(row["Contract Period"]) || "";
                tr.appendChild(td6);
                const td7 = document.createElement("td");
                td7.setAttribute("data-field", "Estimated Contract Amount");
                td7.innerHTML = escapeHtml(row["Estimated Contract Amount"]) || "";
                tr.appendChild(td7);
                const td8 = document.createElement("td");
                td8.setAttribute("data-field", "Date of Award");
                td8.innerHTML = escapeHtml(row["Date of Award"]) || "";
                tr.appendChild(td8);
                const td9 = document.createElement("td");
                td9.setAttribute("data-field", "Column");
                td9.innerHTML = escapeHtml(row["Column"]) || "";
                tr.appendChild(td9);
                const td10 = document.createElement("td");
                td10.setAttribute("data-field", "Column");
                td10.innerHTML = escapeHtml(row["Column"]) || "";
                tr.appendChild(td10);
                tableBody.appendChild(tr);
            });
        }

        function filterAndSort() {
            const searchTerm = searchInput.value.toLowerCase();
            const activeFilters = collectFilters();

            let filtered = allData.filter(row => {
                const matchesSearch = Object.values(row).some(val =>
                    String(val).toLowerCase().includes(searchTerm)
                );
                const matchesFilters = Object.entries(activeFilters).every(([field, value]) => row[field] === value);
                return matchesSearch && matchesFilters;
            });

            if (sortField) {
                filtered.sort((a, b) => {
                    let aVal = a[sortField] || '';
                    let bVal = b[sortField] || '';
                    if (sortAsc) {
                        return String(aVal).localeCompare(String(bVal));
                    } else {
                        return String(bVal).localeCompare(String(aVal));
                    }
                });
            }

            renderTable(filtered);
            const parts = [];
            Object.entries(activeFilters).forEach(([field, value]) => {
                parts.push(`${field}: ${value}`);
            });
            filterInfo.textContent = parts.join(' | ');
        }

        searchInput.addEventListener('input', filterAndSort);
        filterSelects.forEach(sel => {
            sel.addEventListener('change', filterAndSort);
        });

        table.querySelectorAll('thead th[data-field]').forEach(th => {
            th.addEventListener('click', () => {
                const field = th.getAttribute('data-field');
                if (sortField === field) {
                    sortAsc = !sortAsc;
                } else {
                    sortField = field;
                    sortAsc = true;
                }
                table.querySelectorAll('th').forEach(header => {
                    header.classList.remove('asc', 'desc');
                });
                th.classList.add(sortAsc ? 'asc' : 'desc');
                filterAndSort();
            });
        });

        filterAndSort();
    </script>
